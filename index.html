<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maya Parfum | Catálogo de Decants</title>
  <style>
    :root {
      --bg:#0b0b0f;
      --card:#15151d;
      --gold:#d4af37;
      --text:#f5f5f5;
      --muted:#b9b9c6;
      --green:#25d366;
      --line:#2a2a36;
      --rose:#ff7ab6;
      --blue:#60a5fa;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#050507,#11111a);
      color:var(--text);
    }
    header{
      padding:32px 16px 26px;
      text-align:center;
      background:radial-gradient(circle at top,#292330,#07070b 65%);
      border-bottom:1px solid var(--line);
    }
    header h1{
      margin:0;
      font-size:38px;
      letter-spacing:2px;
      color:var(--gold);
    }
    header p{
      margin:9px auto 0;
      max-width:820px;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
    }
    .bar{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(11,11,15,.96);
      backdrop-filter:blur(8px);
      padding:12px;
      border-bottom:1px solid var(--line);
    }
    .controls{
      max-width:1180px;
      margin:auto;
      display:grid;
      grid-template-columns:1fr 180px 160px 170px;
      gap:10px;
    }
    input,select{
      width:100%;
      border:1px solid var(--line);
      background:#111119;
      color:var(--text);
      padding:12px;
      border-radius:10px;
      font-size:14px;
    }
    main{
      max-width:1180px;
      margin:20px auto 150px;
      padding:0 12px;
    }
    .section-title{
      margin:28px 0 12px;
      font-size:22px;
      color:var(--gold);
      border-left:4px solid var(--gold);
      padding-left:10px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:14px;
    }
    .card{
      background:linear-gradient(180deg,#181821,#101016);
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,.25);
    }
    .img-wrap{
      height:190px;
      background:linear-gradient(135deg,#22222d,#08080d);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
    }
    .img-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .placeholder{
      width:78px;
      height:78px;
      border:1px solid var(--gold);
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--gold);
      font-size:34px;
      opacity:.85;
    }
    .img-name{
      position:absolute;
      left:10px;
      right:10px;
      bottom:9px;
      color:#fff;
      font-size:11px;
      text-align:center;
      opacity:.6;
    }
    .content{padding:15px}
    .tag{
      display:inline-block;
      font-size:11px;
      color:#111;
      background:var(--gold);
      padding:4px 8px;
      border-radius:999px;
      margin-bottom:8px;
      font-weight:bold;
    }
    .tag.mujer{background:var(--rose); color:#1b0711}
    .tag.arabe{background:#99f6e4; color:#042f2e}
    .card h3{
      margin:0 0 6px;
      font-size:18px;
      line-height:1.2;
    }
    .inspired{
      min-height:38px;
      color:var(--muted);
      font-size:13px;
      margin-bottom:12px;
    }
    .prices{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:7px;
    }
    .price{
      border:1px solid var(--line);
      border-radius:10px;
      text-align:center;
      padding:8px 4px;
      background:#0d0d13;
      cursor:pointer;
    }
    .price:hover{border-color:var(--gold)}
    .price b{
      display:block;
      color:var(--gold);
      font-size:15px;
    }
    .price span{
      font-size:12px;
      color:var(--muted);
    }
    .cart{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#08080c;
      border-top:1px solid var(--line);
      padding:10px 12px;
      z-index:20;
    }
    .cart-inner{
      max-width:1180px;
      margin:auto;
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
    }
    .cart-list{
      color:var(--muted);
      font-size:13px;
      max-height:50px;
      overflow:auto;
      line-height:1.35;
    }
    button{
      border:0;
      border-radius:10px;
      padding:12px 14px;
      font-weight:bold;
      cursor:pointer;
    }
    .wa{background:var(--green); color:#071208}
    .clear{background:#252532; color:#fff}
    .empty{
      color:var(--muted);
      text-align:center;
      margin:40px 0;
    }
    @media(max-width:900px){
      .controls{grid-template-columns:1fr 1fr}
    }
    @media(max-width:760px){
      .controls{grid-template-columns:1fr}
      .cart-inner{grid-template-columns:1fr}
      header h1{font-size:28px}
      .img-wrap{height:170px}
      .prices{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>

</div>

<main id="catalog"></main>

</div>

let cart = [];

function safeText(str){
  return String(str || "").replace(/[&<>"']/g, function(m){
    return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[m];
  });
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("category").value;
  const gender = document.getElementById("gender").value;
  const sort = document.getElementById("sort").value;

  let filtered = products.filter(p =>
    (cat === "all" || p.cat === cat) &&
    (gender === "all" || p.gender === gender) &&
    (p.name.toLowerCase().includes(q) || p.inspired.toLowerCase().includes(q))
  );

  if(sort === "low") filtered.sort((a,b)=>a.p30-b.p30);
  if(sort === "high") filtered.sort((a,b)=>b.p30-a.p30);

  const cats = ["Diseñador Hombre","Árabes Hombre","Mujer"];
  let html = "";
  cats.forEach(c=>{
    const items = filtered.filter(p=>p.cat===c);
    if(!items.length) return;
    html += `<h2 class="section-title">${c}</h2><div class="grid">`;
    items.forEach(p=>{
      const tagClass = p.gender === "Mujer" ? "tag mujer" : (p.cat.includes("Árabes") ? "tag arabe" : "tag");
      const name = safeText(p.name);
      const inspired = safeText(p.inspired || "Original");
      html += `<div class="card">
        <div class="img-wrap">
          <img src="${safeText(p.img)}" alt="${name}" onerror="this.style.display='none'; this.parentElement.querySelector('.placeholder').style.display='flex'; this.parentElement.querySelector('.img-name').style.display='block';">
          <div class="placeholder" style="display:none;">🧴</div>
          <div class="img-name" style="display:none;">${safeText(p.img)}</div>
        </div>
        <div class="content">
          <span class="${tagClass}">${safeText(p.cat)}</span>
          <h3>${name}</h3>
          <div class="inspired">Inspirado en: <b>${inspired}</b></div>
          <div class="prices">
            <div class="price" onclick="addToCart(${JSON.stringify(p.name)}, '3 ml', ${p.p3})"><b>${currency(p.p3)}</b><span>3 ml</span></div>
            <div class="price" onclick="addToCart(${JSON.stringify(p.name)}, '5 ml', ${p.p5})"><b>${currency(p.p5)}</b><span>5 ml</span></div>
            <div class="price" onclick="addToCart(${JSON.stringify(p.name)}, '10 ml', ${p.p10})"><b>${currency(p.p10)}</b><span>10 ml</span></div>
            <div class="price" onclick="addToCart(${JSON.stringify(p.name)}, '30 ml', ${p.p30})"><b>${currency(p.p30)}</b><span>30 ml</span></div>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("catalog").innerHTML = html || `<div class="empty">No encontré perfumes con esa búsqueda.</div>`;
}

function currency(n){ return "$" + n; }

function addToCart(name, size, price){
  cart.push({name,size,price});
  updateCart();
}

function updateCart(){
  const total = cart.reduce((s,i)=>s+i.price,0);
  const text = cart.length ? cart.map(i=>`${i.name} ${i.size} $${i.price}`).join(" • ") + ` | Total: $${total}` : "Aún no agregas perfumes.";
  document.getElementById("cartList").textContent = text;
}

function clearCart(){
  cart = [];
  updateCart();
}

function sendWhatsApp(){
  if(!cart.length){
    alert("Agrega al menos un perfume al pedido.");
    return;
  }
  const total = cart.reduce((s,i)=>s+i.price,0);
  const items = cart.map(i=>`• ${i.name} – ${i.size} – $${i.price}`).join("%0A");
  const msg = `Hola, quiero realizar este pedido:%0A%0A${items}%0A%0ATotal: $${total}`;
  window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("category").addEventListener("change", render);
document.getElementById("gender").addEventListener("change", render);
document.getElementById("sort").addEventListener("change", render);
render();
</script>
